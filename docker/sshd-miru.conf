# Root is the intended cloud-instance administration account, but it may
# authenticate only with a configured public key.
AllowUsers root
PermitRootLogin prohibit-password
AuthenticationMethods publickey
PubkeyAuthentication yes
AuthorizedKeysFile /run/miru/authorized_keys
PasswordAuthentication no
KbdInteractiveAuthentication no
ChallengeResponseAuthentication no
PermitEmptyPasswords no
StrictModes yes

# Retain local forwarding for SSH-tunneled Miru UI access, while disabling
# forwarding modes that expose additional attack surface.
AllowTcpForwarding local
AllowAgentForwarding no
AllowStreamLocalForwarding no
GatewayPorts no
X11Forwarding no
PermitTunnel no
PermitUserEnvironment no

LoginGraceTime 30
MaxAuthTries 3
MaxSessions 4
LogLevel VERBOSE
PidFile /run/miru/sshd.pid
