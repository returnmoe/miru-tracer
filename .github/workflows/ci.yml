name: CI

on:
  pull_request:
  push:
    branches: [development, master]
  workflow_dispatch:
  schedule:
    - cron: "17 6 * * 1"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Python ${{ matrix.python }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - name: Install verified CPU dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]' -c constraints.txt --extra-index-url https://download.pytorch.org/whl/cpu
      - run: python -m pip check
      - run: ruff check src tests
      - run: pytest

  qwen:
    name: Qwen3 end-to-end
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.12"
          cache: pip
      - name: Install verified CPU dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]' -c constraints.txt --extra-index-url https://download.pytorch.org/whl/cpu
      - name: Run required external-model tests
        env:
          MIRU_REQUIRE_EXTERNAL_MODEL: "1"
          HF_HOME: ${{ runner.temp }}/huggingface
        run: pytest -m external_model

  docker:
    name: CUDA ${{ matrix.variant }} image
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: cu126
            cuda_image: nvidia/cuda:12.6.3-base-ubuntu24.04@sha256:c87e78933f4c16e3272123bf2f75537306596d0fbaa395a29696a22786e5ee0e
            torch_index: https://download.pytorch.org/whl/cu126
            expected_cuda: "12.6"
            cuda_toolkit_version: 12.6.3
            cuda_bindings_spec: cuda-bindings==12.9.4
            cuda_dnn_spec: nvidia-cudnn-cu12==9.10.2.21
            cuda_sparselt_spec: nvidia-cusparselt-cu12==0.7.1
            cuda_nccl_spec: nvidia-nccl-cu12==2.29.3
            cuda_nvshmem_spec: nvidia-nvshmem-cu12==3.4.5
          - variant: cu130
            cuda_image: nvidia/cuda:13.0.3-base-ubuntu24.04@sha256:7c7413a56200486f71f181cad9310f6fd31b6bb21816ade15fc9c1e1e927a5c1
            torch_index: https://download.pytorch.org/whl/cu130
            expected_cuda: "13.0"
            cuda_toolkit_version: 13.0.2
            cuda_bindings_spec: cuda-bindings==13.0.3
            cuda_dnn_spec: nvidia-cudnn-cu13==9.20.0.48
            cuda_sparselt_spec: nvidia-cusparselt-cu13==0.8.1
            cuda_nccl_spec: nvidia-nccl-cu13==2.29.7
            cuda_nvshmem_spec: nvidia-nvshmem-cu13==3.4.5
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c
      - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a
        with:
          context: .
          platforms: linux/amd64
          push: false
          load: true
          tags: miru-tracer:ci-${{ matrix.variant }}
          build-args: |
            CUDA_IMAGE=${{ matrix.cuda_image }}
            TORCH_INDEX=${{ matrix.torch_index }}
            EXPECTED_CUDA=${{ matrix.expected_cuda }}
            CUDA_TOOLKIT_VERSION=${{ matrix.cuda_toolkit_version }}
            CUDA_BINDINGS_SPEC=${{ matrix.cuda_bindings_spec }}
            CUDA_DNN_SPEC=${{ matrix.cuda_dnn_spec }}
            CUDA_SPARSELT_SPEC=${{ matrix.cuda_sparselt_spec }}
            CUDA_NCCL_SPEC=${{ matrix.cuda_nccl_spec }}
            CUDA_NVSHMEM_SPEC=${{ matrix.cuda_nvshmem_spec }}
          cache-from: type=gha,scope=docker-${{ matrix.variant }}
          cache-to: type=gha,mode=max,scope=docker-${{ matrix.variant }}
      - name: Smoke-test image services and hardening
        run: tests/docker/smoke.sh miru-tracer:ci-${{ matrix.variant }} ${{ matrix.expected_cuda }}
