name: CI

on:
  pull_request:
  push:
    branches: [development, master]
  workflow_dispatch:
  schedule:
    - cron: "17 6 * * 1"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Python ${{ matrix.python }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - name: Install verified CPU dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]' -c constraints.txt --extra-index-url https://download.pytorch.org/whl/cpu
      - run: python -m pip check
      - run: ruff check src tests
      - run: pytest

  qwen:
    name: Qwen3 end-to-end
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.12"
          cache: pip
      - name: Install verified CPU dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]' -c constraints.txt --extra-index-url https://download.pytorch.org/whl/cpu
      - name: Run required external-model tests
        env:
          MIRU_REQUIRE_EXTERNAL_MODEL: "1"
          HF_HOME: ${{ runner.temp }}/huggingface
        run: pytest -m external_model

  docker:
    name: CUDA image builds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c
      - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a
        with:
          context: .
          platforms: linux/amd64
          push: false
          tags: miru-tracer:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
