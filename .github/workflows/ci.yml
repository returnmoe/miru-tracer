name: CI

on:
  pull_request:
  push:
    branches: [development, master]
  workflow_dispatch:
  schedule:
    - cron: "17 6 * * 1"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Python ${{ matrix.python }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - name: Install verified CPU dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]' -c constraints.txt --extra-index-url https://download.pytorch.org/whl/cpu
      - run: python -m pip check
      - run: ruff check src tests
      - run: pytest

  qwen:
    name: Qwen3 end-to-end
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.12"
          cache: pip
      - name: Install verified CPU dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]' -c constraints.txt --extra-index-url https://download.pytorch.org/whl/cpu
      - name: Run required external-model tests
        env:
          MIRU_REQUIRE_EXTERNAL_MODEL: "1"
          HF_HOME: ${{ runner.temp }}/huggingface
        run: pytest -m external_model

  docker:
    name: CUDA ${{ matrix.variant }} image
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: cu126
            cuda_image: nvidia/cuda:12.6.3-cudnn-runtime-ubuntu24.04@sha256:8aef630a54bc5c5146ae5ce68e6af5caa3df0fb690bb91544175c91f307e4356
            torch_index: https://download.pytorch.org/whl/cu126
            expected_cuda: "12.6"
          - variant: cu130
            cuda_image: nvidia/cuda:13.0.3-cudnn-runtime-ubuntu24.04@sha256:14f6d08d1cd4a96effbfe3101d0b56326f552c199d05e4979ee0bd616df5811b
            torch_index: https://download.pytorch.org/whl/cu130
            expected_cuda: "13.0"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c
      - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a
        with:
          context: .
          platforms: linux/amd64
          push: false
          load: true
          tags: miru-tracer:ci-${{ matrix.variant }}
          build-args: |
            CUDA_IMAGE=${{ matrix.cuda_image }}
            TORCH_INDEX=${{ matrix.torch_index }}
            EXPECTED_CUDA=${{ matrix.expected_cuda }}
          cache-from: type=gha,scope=docker-${{ matrix.variant }}
          cache-to: type=gha,mode=max,scope=docker-${{ matrix.variant }}
      - name: Smoke-test image services and hardening
        run: tests/docker/smoke.sh miru-tracer:ci-${{ matrix.variant }} ${{ matrix.expected_cuda }}
