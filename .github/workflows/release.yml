name: Release

on:
  workflow_run:
    workflows: [CI]
    branches: [master]
    types: [completed]

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write
  artifact-metadata: write

concurrency:
  group: release-master
  cancel-in-progress: false

jobs:
  publish-images:
    if: github.event.workflow_run.conclusion == 'success'
    name: Publish ${{ matrix.variant }} image
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: cu126
            suffix: -cu126
            publish_unqualified: true
            cuda_image: nvidia/cuda:12.6.3-cudnn-runtime-ubuntu24.04@sha256:8aef630a54bc5c5146ae5ce68e6af5caa3df0fb690bb91544175c91f307e4356
            torch_index: https://download.pytorch.org/whl/cu126
            expected_cuda: "12.6"
          - variant: cu130
            suffix: -cu130
            publish_unqualified: false
            cuda_image: nvidia/cuda:13.0.3-cudnn-runtime-ubuntu24.04@sha256:14f6d08d1cd4a96effbfe3101d0b56326f552c199d05e4979ee0bd616df5811b
            torch_index: https://download.pytorch.org/whl/cu130
            expected_cuda: "13.0"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0
      - name: Confirm this is the current master commit
        run: |
          git fetch origin master --depth=1
          test "$(git rev-parse HEAD)" = "$(git rev-parse origin/master)"
      - id: version
        name: Read and validate release version
        shell: bash
        run: |
          version=$(sed -n 's/^version = "\([^"]*\)"/\1/p' pyproject.toml)
          test -n "$version"
          test "$version" = "0.2.0"
          echo "version=$version" >> "$GITHUB_OUTPUT"
      - name: Reject a conflicting release tag
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          tag="v${VERSION}"
          if git rev-parse "$tag" >/dev/null 2>&1; then
            test "$(git rev-list -n 1 "$tag")" = "$(git rev-parse HEAD)"
          fi
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c
      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}${{ matrix.suffix }}
            type=raw,value=0.2${{ matrix.suffix }}
            type=raw,value=latest${{ matrix.suffix }}
            type=sha,format=long,suffix=${{ matrix.suffix }}
            type=raw,value=${{ steps.version.outputs.version }},enable=${{ matrix.publish_unqualified }}
            type=raw,value=0.2,enable=${{ matrix.publish_unqualified }}
            type=raw,value=latest,enable=${{ matrix.publish_unqualified }}
            type=sha,format=long,enable=${{ matrix.publish_unqualified }}
      - id: push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            CUDA_IMAGE=${{ matrix.cuda_image }}
            TORCH_INDEX=${{ matrix.torch_index }}
            EXPECTED_CUDA=${{ matrix.expected_cuda }}
          cache-from: type=gha,scope=docker-${{ matrix.variant }}
          cache-to: type=gha,mode=max,scope=docker-${{ matrix.variant }}
      - name: Verify published version tag
        env:
          IMAGE: ghcr.io/${{ github.repository }}
          TAG: ${{ steps.version.outputs.version }}${{ matrix.suffix }}
        run: |
          docker buildx imagetools inspect "${IMAGE}:${TAG}"
          {
            echo "### Published ${{ matrix.variant }} image"
            echo
            echo "\`${IMAGE}:${TAG}\`"
            echo
            echo "Digest: \`${{ steps.push.outputs.digest }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373
        with:
          subject-name: ghcr.io/${{ github.repository }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

  release-metadata:
    needs: publish-images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0
      - id: version
        name: Read and validate release version
        shell: bash
        run: |
          version=$(sed -n 's/^version = "\([^"]*\)"/\1/p' pyproject.toml)
          test -n "$version"
          test "$version" = "0.2.0"
          echo "version=$version" >> "$GITHUB_OUTPUT"
      - name: Create annotated tag if absent
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          tag="v${VERSION}"
          if git rev-parse "$tag" >/dev/null 2>&1; then
            test "$(git rev-list -n 1 "$tag")" = "$(git rev-parse HEAD)"
          else
            git config user.name github-actions[bot]
            git config user.email 41898282+github-actions[bot]@users.noreply.github.com
            git tag -a "$tag" -m "Miru Tracer $tag"
            git push origin "$tag"
          fi
      - name: Create generated GitHub Release if absent
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          tag="v${VERSION}"
          gh release view "$tag" >/dev/null 2>&1 || \
            gh release create "$tag" --verify-tag --generate-notes --title "$tag"
