name: Release

on:
  workflow_run:
    workflows: [CI]
    branches: [master]
    types: [completed]

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write
  artifact-metadata: write

concurrency:
  group: release-master
  cancel-in-progress: false

jobs:
  publish-images:
    if: github.event.workflow_run.conclusion == 'success'
    name: Publish ${{ matrix.variant }} image
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: cu126
            suffix: -cu126
            publish_unqualified: true
            cuda_image: nvidia/cuda:12.6.3-base-ubuntu24.04@sha256:c87e78933f4c16e3272123bf2f75537306596d0fbaa395a29696a22786e5ee0e
            torch_index: https://download.pytorch.org/whl/cu126
            expected_cuda: "12.6"
            cuda_toolkit_version: 12.6.3
            cuda_bindings_spec: cuda-bindings==12.9.4
            cuda_dnn_spec: nvidia-cudnn-cu12==9.10.2.21
            cuda_sparselt_spec: nvidia-cusparselt-cu12==0.7.1
            cuda_nccl_spec: nvidia-nccl-cu12==2.29.3
            cuda_nvshmem_spec: nvidia-nvshmem-cu12==3.4.5
          - variant: cu130
            suffix: -cu130
            publish_unqualified: false
            cuda_image: nvidia/cuda:13.0.3-base-ubuntu24.04@sha256:7c7413a56200486f71f181cad9310f6fd31b6bb21816ade15fc9c1e1e927a5c1
            torch_index: https://download.pytorch.org/whl/cu130
            expected_cuda: "13.0"
            cuda_toolkit_version: 13.0.2
            cuda_bindings_spec: cuda-bindings==13.0.3
            cuda_dnn_spec: nvidia-cudnn-cu13==9.20.0.48
            cuda_sparselt_spec: nvidia-cusparselt-cu13==0.8.1
            cuda_nccl_spec: nvidia-nccl-cu13==2.29.7
            cuda_nvshmem_spec: nvidia-nvshmem-cu13==3.4.5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0
      - name: Confirm this is the current master commit
        run: |
          git fetch origin master --depth=1
          test "$(git rev-parse HEAD)" = "$(git rev-parse origin/master)"
      - id: version
        name: Read and validate release version
        shell: bash
        run: |
          version=$(sed -n 's/^version = "\([^"]*\)"/\1/p' pyproject.toml)
          test -n "$version"
          test "$version" = "0.2.1"
          echo "version=$version" >> "$GITHUB_OUTPUT"
      - name: Reject a conflicting release tag
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          tag="v${VERSION}"
          if git rev-parse "$tag" >/dev/null 2>&1; then
            test "$(git rev-list -n 1 "$tag")" = "$(git rev-parse HEAD)"
          fi
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c
      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}${{ matrix.suffix }}
            type=raw,value=0.2${{ matrix.suffix }}
            type=raw,value=latest${{ matrix.suffix }}
            type=sha,format=long,suffix=${{ matrix.suffix }}
            type=raw,value=${{ steps.version.outputs.version }},enable=${{ matrix.publish_unqualified }}
            type=raw,value=0.2,enable=${{ matrix.publish_unqualified }}
            type=raw,value=latest,enable=${{ matrix.publish_unqualified }}
            type=sha,format=long,enable=${{ matrix.publish_unqualified }}
      - id: push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            CUDA_IMAGE=${{ matrix.cuda_image }}
            TORCH_INDEX=${{ matrix.torch_index }}
            EXPECTED_CUDA=${{ matrix.expected_cuda }}
            CUDA_TOOLKIT_VERSION=${{ matrix.cuda_toolkit_version }}
            CUDA_BINDINGS_SPEC=${{ matrix.cuda_bindings_spec }}
            CUDA_DNN_SPEC=${{ matrix.cuda_dnn_spec }}
            CUDA_SPARSELT_SPEC=${{ matrix.cuda_sparselt_spec }}
            CUDA_NCCL_SPEC=${{ matrix.cuda_nccl_spec }}
            CUDA_NVSHMEM_SPEC=${{ matrix.cuda_nvshmem_spec }}
          cache-from: type=gha,scope=docker-${{ matrix.variant }}
          cache-to: type=gha,mode=max,scope=docker-${{ matrix.variant }}
      - name: Verify published version tag and pull size
        env:
          IMAGE: ghcr.io/${{ github.repository }}
          TAG: ${{ steps.version.outputs.version }}${{ matrix.suffix }}
          MAX_IMAGE_BYTES: "4500000000"
          MAX_LAYER_BYTES: "1500000000"
        run: |
          docker buildx imagetools inspect "${IMAGE}:${TAG}"
          raw=$(docker buildx imagetools inspect --raw "${IMAGE}:${TAG}")
          if digest=$(echo "$raw" | jq -er \
            '.manifests[] | select(.platform.os == "linux" and .platform.architecture == "amd64") | .digest'); then
            manifest=$(docker buildx imagetools inspect --raw "${IMAGE}@${digest}")
          else
            manifest=$raw
          fi
          total_bytes=$(echo "$manifest" | jq -er '[.layers[].size] | add')
          largest_layer_bytes=$(echo "$manifest" | jq -er '[.layers[].size] | max')
          test "$total_bytes" -le "$MAX_IMAGE_BYTES"
          test "$largest_layer_bytes" -le "$MAX_LAYER_BYTES"
          {
            echo "### Published ${{ matrix.variant }} image"
            echo
            echo "\`${IMAGE}:${TAG}\`"
            echo
            echo "Digest: \`${{ steps.push.outputs.digest }}\`"
            echo
            echo "Compressed layers: $(numfmt --to=iec-i --suffix=B "$total_bytes") total; " \
              "$(numfmt --to=iec-i --suffix=B "$largest_layer_bytes") largest"
          } >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373
        with:
          subject-name: ghcr.io/${{ github.repository }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

  release-metadata:
    needs: publish-images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0
      - id: version
        name: Read and validate release version
        shell: bash
        run: |
          version=$(sed -n 's/^version = "\([^"]*\)"/\1/p' pyproject.toml)
          test -n "$version"
          test "$version" = "0.2.1"
          echo "version=$version" >> "$GITHUB_OUTPUT"
      - name: Create annotated tag if absent
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          tag="v${VERSION}"
          if git rev-parse "$tag" >/dev/null 2>&1; then
            test "$(git rev-list -n 1 "$tag")" = "$(git rev-parse HEAD)"
          else
            git config user.name github-actions[bot]
            git config user.email 41898282+github-actions[bot]@users.noreply.github.com
            git tag -a "$tag" -m "Miru Tracer $tag"
            git push origin "$tag"
          fi
      - name: Create generated GitHub Release if absent
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          tag="v${VERSION}"
          gh release view "$tag" >/dev/null 2>&1 || \
            gh release create "$tag" --verify-tag --generate-notes --title "$tag"
